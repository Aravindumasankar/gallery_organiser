<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gallery Organiser</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      body { font-family: sans-serif; margin: 0; }
      header { background: #333; color: #fff; padding: 10px; }
      #browser { padding: 10px; }
      .dirs button { margin-right: 5px; }
      .gallery { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
      figure { margin: 0; }
      figure img { width: 200px; height: 200px; object-fit: cover; display: block; }
      figcaption { text-align: center; font-size: 0.9em; }
    </style>
  </head>
  <body>
    <header>Gallery Organiser</header>
    <div id="root"></div>
    <script>
      const e = React.createElement;
      function App() {
        const [path, setPath] = React.useState('/');
        const [dirs, setDirs] = React.useState([]);
        const [files, setFiles] = React.useState([]);

        const load = React.useCallback(() => {
          fetch(`/api/dirs?path=${encodeURIComponent(path)}`)
            .then((r) => r.json())
            .then(setDirs);
          fetch(`/api/media?path=${encodeURIComponent(path)}`)
            .then((r) => r.json())
            .then(setFiles);
        }, [path]);
        React.useEffect(load, [load]);

        const goUp = () => {
          if (path === '/') return;
          const parent = path.replace(/\/$/, '').split('/').slice(0, -1).join('/') || '/';
          setPath(parent);
        };

        return e('div', { id: 'browser' },
          e('div', { className: 'path' },
            e('button', { onClick: goUp }, 'Up'),
            e('span', { style: { marginLeft: '8px' } }, path)
          ),
          e('div', { className: 'dirs' },
            dirs.map((d) => e('button', { key: d, onClick: () => setPath(d) }, d))
          ),
          e('div', { className: 'gallery' },
            files.map((f) => e('figure', { key: f.path },
              e('img', { src: `/api/file?path=${encodeURIComponent(f.path)}` }),
              e('figcaption', null, f.label)
            ))
          )
        );
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(e(App));
    </script>
  </body>
</html>
