<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gallery Organiser</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const e = React.createElement;
      function App() {
        const [path, setPath] = React.useState('/');
        const [dirs, setDirs] = React.useState([]);
        const [files, setFiles] = React.useState([]);

        const load = React.useCallback(() => {
          fetch(`/api/dirs?path=${encodeURIComponent(path)}`)
            .then((r) => r.json())
            .then(setDirs);
          fetch(`/api/media?path=${encodeURIComponent(path)}`)
            .then((r) => r.json())
            .then(setFiles);
        }, [path]);
        React.useEffect(load, [load]);

        const goUp = () => {
          if (path === '/') return;
          const parent = path.replace(/\/$/, '').split('/').slice(0, -1).join('/') || '/';
          setPath(parent);
        };

        return e('div', null,
          e('div', null,
            e('button', { onClick: goUp }, 'Up'),
            e('span', { style: { marginLeft: '8px' } }, path)
          ),
          e('ul', null,
            dirs.map((d) => e('li', { key: d },
              e('button', { onClick: () => setPath(d) }, d)
            ))
          ),
          e('div', null,
            files.map((f) => e('img', {
              key: f,
              src: `/api/file?path=${encodeURIComponent(f)}`,
              style: { maxWidth: '200px', maxHeight: '200px', margin: '4px' }
            }))
          )
        );
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(e(App));
    </script>
  </body>
</html>
